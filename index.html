<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>ภาษาไทย · 태국어 학습</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-logo">
        <span class="logo-thai">ภาษาไทย</span>
        <span class="logo-korean">태국어 학습</span>
      </div>
      <p class="login-desc">구글 계정으로 로그인하면<br>학습 기록이 기기 간 동기화됩니다</p>
      <button id="btn-google-login" class="btn-login">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 시작하기
      </button>
      <div id="login-loading" class="login-loading hidden">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <div id="screen-app" class="screen hidden">
    <header class="app-header">
      <div class="header-left"><span class="header-title">ภาษาไทย</span></div>
      <div class="header-right">
        <div id="streak-badge" class="streak-badge">
          <span class="streak-fire">🔥</span>
          <span id="streak-count" class="streak-num">0</span>
        </div>
        <button id="btn-logout" class="btn-icon" title="로그아웃">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <div id="tab-letters" class="tab-content active">
        <div class="tab-inner">
          <div class="section-head">
            <h2 class="section-title">자음 <span class="title-thai">พยัญชนะ</span></h2>
          </div>
          <div class="group-filter">
            <button class="filter-btn active" data-group="all">전체</button>
            <button class="filter-btn" data-group="mid">중성</button>
            <button class="filter-btn" data-group="high">고성</button>
            <button class="filter-btn" data-group="low">저성</button>
          </div>
          <div id="consonant-grid" class="consonant-grid"></div>
          <div class="quiz-trigger"><button id="btn-letter-quiz" class="btn-primary">퀴즈 시작</button></div>
        </div>
      </div>

      </main>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="letters"><span>문자</span></button>
      <button class="tab-btn" data-tab="words"><span>단어</span></button>
      <button class="tab-btn" data-tab="today"><span>오늘</span></button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import App from './app.js';

    // 사용자가 제공한 Firebase 설정값
    const firebaseConfig = {
      apiKey: "AIzaSyAp7ieanqyVA9ojlHgUsptTO-tWPLXtEJo",
      authDomain: "thai-learn-d031a.firebaseapp.com",
      projectId: "thai-learn-d031a",
      storageBucket: "thai-learn-d031a.firebasestorage.app",
      messagingSenderId: "1029695958196",
      appId: "1:1029695958196:web:ed1de528c422848c9b3be1"
    };

    // Firebase 초기화
    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const provider = new GoogleAuthProvider();

    // 전역 객체에 할당하여 app.js에서 참조 가능하게 설정
    window.__firebase = { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged };

    // 앱 인스턴스 실행
    const appInstance = new App();

    // --- 로그인/로그아웃 버튼 이벤트 처리 ---
    const btnLogin = document.getElementById('btn-google-login');
    const btnLogout = document.getElementById('btn-logout');
    const loading = document.getElementById('login-loading');

    // 로그인 실행
    btnLogin.addEventListener('click', async () => {
      loading.classList.remove('hidden');
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("로그인 실패:", error);
        alert("로그인에 실패했습니다.");
      } finally {
        loading.classList.add('hidden');
      }
    });

    // 로그아웃 실행
    btnLogout.addEventListener('click', () => {
      if(confirm("로그아웃 하시겠습니까?")) {
        signOut(auth);
      }
    });

    // 인증 상태 감지에 따른 화면 전환
    onAuthStateChanged(auth, (user) => {
      const screenLogin = document.getElementById('screen-login');
      const screenApp = document.getElementById('screen-app');

      if (user) {
        screenLogin.classList.add('hidden');
        screenLogin.classList.remove('active');
        screenApp.classList.remove('hidden');
        screenApp.classList.add('active');
        console.log("로그인됨:", user.displayName);
      } else {
        screenLogin.classList.remove('hidden');
        screenLogin.classList.add('active');
        screenApp.classList.add('hidden');
        screenApp.classList.remove('active');
        console.log("로그아웃됨");
      }
    });
  </script>
</body>
</html>
